# Netlify deployment config for Elevate Frontend.
# All 35 migrated routes are emitted as direct static index.html files in dist/
# by scripts/build-wordpress-html.mjs, so deep links resolve without rewrites.
# These rules cover commerce/account redirects and legacy index.php aliases.

[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Assisted-commerce redirects: cart/checkout/account routes are not in MVP.
[[redirects]]
  from = "/cart/"
  to = "/contact-us/"
  status = 302
  force = true

[[redirects]]
  from = "/checkout/"
  to = "/contact-us/"
  status = 302
  force = true

[[redirects]]
  from = "/my-account/"
  to = "/contact-us/"
  status = 302
  force = true

[[redirects]]
  from = "/shop/"
  to = "/contact-us/"
  status = 302
  force = true

[[redirects]]
  from = "/manage-profile/"
  to = "/contact-us/"
  status = 302
  force = true

# Legacy WordPress index.php aliases.
[[redirects]]
  from = "/index.php/about/"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/index.php/contact-us/"
  to = "/contact-us/"
  status = 301
  force = true

[[redirects]]
  from = "/index.php/diy-products/"
  to = "/diy-products/"
  status = 301
  force = true

# SPA fallback for any unforeseen route — serves the React shell that loads the
# matching sanitized snapshot from src/generated/pages.json.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
