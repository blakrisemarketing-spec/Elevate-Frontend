# Elevate Career Hub — Hostinger (LiteSpeed/Apache) config.
# Copied to dist/.htaccess at build by scripts/build-priority-routes.mjs.
# This is the Hostinger source of truth for headers + redirects (the
# netlify.toml / vercel.json files are for those hosts only).

Options -Indexes

<IfModule mod_headers.c>
  Header always set X-Content-Type-Options "nosniff"
  Header always set X-Frame-Options "SAMEORIGIN"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), midi=()"
  Header always set Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://js.paystack.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.paystack.co; frame-src https://checkout.paystack.com https://*.paystack.co; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'"
</IfModule>

<IfModule mod_rewrite.c>
  RewriteEngine On

  # Assisted-commerce redirects (cart/checkout/account are not MVP) → contact
  RewriteRule ^cart/?$ /contact-us/ [R=302,L]
  RewriteRule ^checkout/?$ /contact-us/ [R=302,L]
  RewriteRule ^my-account/?$ /contact-us/ [R=302,L]
  RewriteRule ^shop/?$ /contact-us/ [R=302,L]
  RewriteRule ^manage-profile/?$ /contact-us/ [R=302,L]

  # Legacy WordPress index.php aliases (permanent)
  RewriteRule ^index\.php/about/?$ /about/ [R=301,L]
  RewriteRule ^index\.php/contact-us/?$ /contact-us/ [R=301,L]
  RewriteRule ^index\.php/diy-products/?$ /diy-products/ [R=301,L]

  # SPA fallback: serve the app shell for unknown routes, but never for the
  # PHP API, real files, or real directories.
  RewriteCond %{REQUEST_URI} !^/api/
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d
  RewriteRule ^ /index.html [L]
</IfModule>

# Long-cache fingerprinted/static assets
<IfModule mod_expires.c>
  ExpiresActive On
  ExpiresByType text/css "access plus 1 year"
  ExpiresByType application/javascript "access plus 1 year"
  ExpiresByType text/javascript "access plus 1 year"
  ExpiresByType image/webp "access plus 1 year"
  ExpiresByType image/png "access plus 1 year"
  ExpiresByType image/jpeg "access plus 1 year"
  ExpiresByType font/woff2 "access plus 1 year"
  ExpiresByType application/pdf "access plus 1 week"
</IfModule>

# Never serve secrets or config if they ever land in the web root
<FilesMatch "^(config\.php|\.env.*)$">
  Require all denied
</FilesMatch>
