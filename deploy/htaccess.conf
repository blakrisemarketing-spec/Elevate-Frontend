# Elevate Career Hub — Hostinger (LiteSpeed/Apache) config.
# Copied to dist/.htaccess at build by scripts/build-priority-routes.mjs.
# This is the Hostinger source of truth for headers + redirects (the
# netlify.toml / vercel.json files are for those hosts only).

Options -Indexes

<IfModule mod_headers.c>
  Header always set X-Content-Type-Options "nosniff"
  Header always set X-Frame-Options "SAMEORIGIN"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self \"https://checkout.paystack.com\"), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), midi=()"
  Header always set Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://js.paystack.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.paystack.co; frame-src https://checkout.paystack.com https://*.paystack.co https://player.vimeo.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'"

  # Keep non-production hosts (staging.*) out of search indexes. Production
  # (elevatecareerhub.com / www) is unaffected, so no rebuild is needed to flip it.
  SetEnvIfNoCase Host "^staging\." ECH_NOINDEX=1
  Header always set X-Robots-Tag "noindex, nofollow" env=ECH_NOINDEX
</IfModule>

<IfModule mod_rewrite.c>
  RewriteEngine On

  # Assisted-commerce redirects (cart/checkout/account are not MVP) → contact
  RewriteRule ^cart/?$ /contact-us/ [R=302,L]
  RewriteRule ^checkout/?$ /contact-us/ [R=302,L]
  RewriteRule ^my-account/?$ /contact-us/ [R=302,L]
  RewriteRule ^shop/?$ /contact-us/ [R=302,L]
  RewriteRule ^manage-profile/?$ /contact-us/ [R=302,L]

  # Legacy WordPress index.php aliases (permanent)
  RewriteRule ^index\.php/about/?$ /about/ [R=301,L]
  RewriteRule ^index\.php/contact-us/?$ /contact-us/ [R=301,L]
  RewriteRule ^index\.php/diy-products/?$ /diy-products/ [R=301,L]

  # SPA fallback: serve the app shell ONLY for known virtual routes. The route
  # alternation in the last RewriteCond below is generated from
  # src/generated/pages.json at build time by scripts/build-priority-routes.mjs,
  # so it stays in sync with the app. Real files and directories — including the
  # statically rendered priority pages — are served as-is. Anything else falls
  # through to the 404 below instead of a soft-200 homepage.
  RewriteCond %{REQUEST_URI} !^/api/
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d
  RewriteCond %{REQUEST_URI} ^/(__SPA_ROUTES__)/?$ [NC]
  RewriteRule ^ /index.html [L]
</IfModule>

# Branded 404 for any route not matched above. Apache preserves the 404 status,
# fixing the previous soft-404 (unknown URLs returned 200 with the homepage).
ErrorDocument 404 /404.html

# Long-cache fingerprinted/static assets
<IfModule mod_expires.c>
  ExpiresActive On
  ExpiresByType text/css "access plus 1 year"
  ExpiresByType application/javascript "access plus 1 year"
  ExpiresByType text/javascript "access plus 1 year"
  ExpiresByType image/webp "access plus 1 year"
  ExpiresByType image/png "access plus 1 year"
  ExpiresByType image/jpeg "access plus 1 year"
  ExpiresByType font/woff2 "access plus 1 year"
  ExpiresByType application/pdf "access plus 1 week"
</IfModule>

# Never serve secrets or config if they ever land in the web root
<FilesMatch "^(config\.php|\.env.*)$">
  Require all denied
</FilesMatch>
