# SEO content & technical backlog — Ghana-first, diaspora-aware, founder-led.
#
# The nightly routine processes the FIRST item with `status: todo` (top-to-bottom),
# so order = priority. After publishing, it flips the item to `status: done` and
# records the date. Add new items at the right priority; never reorder `done` items.
#
# `volume` = Ghana monthly searches for the primary keyword. Most items below are
# seeded `null` because no live DataForSEO/GSC pull has run yet. The weekly routine
# (`seo-weekly`) fills these in and re-prioritizes; treat the current order as an
# intent-and-business-value best guess until real data lands.
#
# Item shape:
#   - id / type / cluster / slug / keyword / intent / title / status
#   - volume:  Ghana monthly searches (DataForSEO), or null
#   - secondary: extra terms the article should also cover
#   - notes: brief pointer / context
#
# Clusters: career | study-abroad | scholarships | bootcamp | decision | local

